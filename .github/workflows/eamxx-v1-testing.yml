name: EAMxx-v1 testing

on:
  # Runs on PRs against master
  pull_request:
    branches: [ master ]
    types: [opened, synchronize, ready_for_review, reopened]

  # Manual run can be used to bless
  workflow_dispatch:
    inputs:
      machine:
        description: 'Comma-separated list of jobs to run'
        required: false
        default: 'gcc-openmp'
      baselines:
        description: 'Which baselines to bless'
        required: false
        default: 'at,nightly'

  # Add schedule trigger for nightly runs at midnight MT (Standard Time)
  schedule:
    - cron: '0 7 * * *'  # Runs at 7 AM UTC, which is midnight MT during Standard Time

concurrency:
  # Two runs are in the same group if:
  #  - they have the same trigger
  #  - if trigger=pull_request, the PR number must match
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  # If/when you add a new compiler/backend combo, copy-paste the gcc-openmp job, rename it (e.g., intel-serial),
  # and modify the "machine" entry for the test-all-scream action. Also make sure that the matrix is ok for the
  # new machine (e.g., we don't run build type 'fpe' on GPU)
  gcc-openmp:
    runs-on:  [self-hosted, openmp, gcc]
    strategy:
      fail-fast: false
      matrix:
        build_type: [sp, dbg, fpe, opt]
    # Runs always for pull_request. For workflow_dispatch, user must request this machine
    if: ${{ github.event_name == 'pull_request' || contains(github.event.inputs.jobs_to_run, 'openmp-gcc') }}
    name: gcc-openmp-${{ matrix.build_type }}
    steps:
      - name: Show action trigger
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const eventAction = context.payload.action || 'N/A';
            const actor = context.actor;
            console.log(`The job was triggered by a ${eventName} event.`);
            console.log(`  - Event action: ${eventAction}`);
            console.log(`  - Triggered by: ${actor}`);
      - name: Set CA certificates env var
        run: |
          # Ensure the operating system is Linux
          if [ "$(uname)" != "Linux" ]; then
            echo "This action only supports Linux."
            exit 1
          fi
          # Set env var to be used in upload-artifacts phase
          if [ -f /etc/debian_version ]; then
            echo "NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt" >> $GITHUB_ENV
          elif [ -f /etc/redhat-release ] || [ -f /etc/centos-release ] || [ -f /etc/fedora-release ]; then
            echo "NODE_EXTRA_CA_CERTS=/etc/pki/tls/certs/ca-bundle.crt" >> $GITHUB_ENV
          else
            echo "Unsupported Linux distribution"
            exit 1
          fi
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          show-progress: false
          submodules: recursive
      - name: Set cime testing specs
        id: set-test-specs
        run: |
          baselines=${{ github.event.inputs.baselines }}
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "ct_testsuites=e3sm_scream_v1_at" >> $GITHUB_ENV
            echo "ct_flags='-c -b master'" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "schedule" ]; then
            echo "ct_testsuites=e3sm_scream_v1_medres" >> $GITHUB_ENV
            echo "ct_flags='-c -b master'" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            testsuites="${{ github.event.inputs.baselines }}"
            testsuites="${testsuites//,/ }"
            echo "ct_testsuites=$testsuites" >> $GITHUB_ENV
            echo "ct_flags='-o -g -b master'" >> $GITHUB_ENV
          else
            echo "Unsupported event type: ${{ github.event_name }}"
            exit 1
          fi
      - name: Run tests
          ./cime/scripts/create_test ${{ env.ct_testsuites }} ${{ env.ct_flags }} --wait
      # TODO: how to upload cime's test artifacts to gh? CIME does cdash upload, but here
      #       we need to zip a bunch of files and upload them on the action page.
      #       Does create_test offer a way to prepare a tarball of log/bldlog/nc/whatever
      #       files, which can easily be uploaded somewhere?
      # - name: Upload logs
      #   if: always()
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: log-files-v1
      #     path: components/eamxx/ctest-build/*/Testing/Temporary/Last*.log
      #   env:
      #     NODE_EXTRA_CA_CERTS: ${{ env.NODE_EXTRA_CA_CERTS }}

